<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Checkout</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
  <header>
    <div class="nav container">
      <div class="logo"><a href="/index.html">Vallotronics</a></div>
      <div class="links">
        <a href="/cart.html">Cart (<span id="cartCount">0</span>)</a>
      </div>
    </div>
  </header>

  <main class="container">
    <h2>Checkout & Shipping</h2>

    <div class="two-column" style="display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start">
      <form id="checkoutForm" class="card">
        <div class="form-row">
          <label for="fullname">Full name</label>
          <input class="form-input" id="fullname" placeholder="Full name" required>
        </div>

        <div class="form-row">
          <label for="address">Address</label>
          <input class="form-input" id="address" placeholder="Address" required>
        </div>

        <div class="form-row" style="display:flex;gap:8px">
          <div style="flex:1">
            <label for="city">City</label>
            <input class="form-input" id="city" placeholder="City" required>
          </div>

          <div style="width:120px">
            <label for="zip">ZIP</label>
            <input class="form-input" id="zip" placeholder="ZIP" required>
          </div>
        </div>

        <h3 style="margin-top:18px">Payment method</h3>

        <div class="form-row">
          <label for="cardName">Cardholder name</label>
          <input class="form-input" id="cardName" placeholder="Name on card" required>
        </div>

        <div class="form-row">
          <label for="cardNumber">Card number</label>
          <input class="form-input" id="cardNumber" placeholder="1234 5678 9012 3456" inputmode="numeric" required>
        </div>

        <div class="form-row" style="display:flex;gap:8px">
          <div style="flex:1">
            <label for="expiry">Expiry (MM/YY)</label>
            <input class="form-input" id="expiry" placeholder="MM/YY" required>
          </div>

          <div style="width:120px">
            <label for="cvv">CVV</label>
            <input class="form-input" id="cvv" placeholder="123" inputmode="numeric" required>
          </div>
        </div>

        <div class="form-row">
          <button id="placeOrderBtn" class="btn" type="submit">Place Order</button>
          <a href="/cart.html" class="btn secondary back-to-cart">Back to cart</a>
        </div>
      </form>

      <aside class="summary-card" id="orderSummary">
        <h3>Order summary</h3>
        <div id="orderItems"></div>
        <div class="summary-line"><span>Subtotal</span> <strong id="subAmt">$0.00</strong></div>
        <div class="summary-line"><span>Est. tax</span> <span id="taxAmt">$0.00</span></div>
        <div class="summary-line"><span>Shipping</span> <span id="shipAmt">$0.00</span></div>
        <hr>
        <div class="summary-line"><strong>Total</strong> <strong id="totalAmt">$0.00</strong></div>
      </aside>
    </div>
  </main>

  <script src="/js/products.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/checkout.js"></script>
</body>

</html>
