<!doctype html>
<html>

<head>
  <header>
    <div class="nav container">
      <div class="logo"><a href="index.html">Vallotronics</a></div>
      <div class="links"></div>
    </div>
  </header>
  <title>Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <main class="container">
    <h2>Account</h2>

    <div id="forms" class="auth-card">
      <section id="loginSection">
        <h3>Login</h3>

        <form id="loginForm">
          <div class="form-row">
            <input class="form-input" type="email" id="email" placeholder="Email" required>
          </div>

          <div class="form-row">
            <input class="form-input" type="password" id="password" placeholder="Password" required>
          </div>

          <div class="form-row">
            <button class="btn" type="submit">Log in</button>
          </div>
        </form>

        <p class="muted">For this demo use UNAME: admin@admin.com and PWORD: admin for the admin account</p>
        <p class="muted">For this demo use UNAME: john@doe.com and PWORD: johndoe for the user account</p>
        <p>Don't have an account? <a href="#" id="showRegister" class="muted-link">Create one</a></p>
      </section>

      <section id="registerSection" style="display:none">
        <h3>Create account</h3>

        <form id="regForm">
          <div class="form-row">
            <input class="form-input" id="name" placeholder="Full name" required>
          </div>

          <div class="form-row">
            <input class="form-input" type="email" id="regEmail" placeholder="Email" required>
          </div>

          <div class="form-row">
            <input class="form-input" type="password" id="regPassword" placeholder="Password" required>
          </div>

          <div class="form-row">
            <button class="btn" type="submit">Register</button>
            <button id="cancelRegister" class="btn secondary">Cancel</button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
