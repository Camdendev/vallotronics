<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Cart</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>

  <body>
    <header>
      <div class="nav container">
        <div class="logo"><a href="index.html">Vallotronics</a></div>
        <div class="links">
          <a href="products.html">Products</a>
          <a href="checkout.html">Checkout</a>
        </div>
      </div>
    </header>

    <main class="container">
      <h2>Your Cart</h2>

      <div class="two-column cart-layout" style="display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start">
        <div>
          <div id="cart" class="cart-list"></div>
          <p class="muted">Tip: update quantities directly. Your cart is stored locally in this mockup.</p>
        </div>

        <aside class="summary-card" id="summary"></aside>
      </div>
    </main>

    <script src="js/products.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
  </body>
</html>
